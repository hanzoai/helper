name: Load KMS secrets
description: >
  Load an org/env's secrets from KMS into the job, using the canonical live KMS
  API (/v1/kms/orgs/{org}/secrets). The token is an IAM-issued OIDC token KMS
  verifies against hanzo.id's JWKS — the same trust the `kms` CLI uses for local
  dev. KMS lists keys, then reads each value (no bulk-value endpoint by design).

inputs:
  org:
    description: Organization slug (KMS scopes secrets by org).
    required: true
  env:
    description: "Environment slug: devnet | testnet | mainnet | production."
    required: false
    default: production
  token:
    description: >
      IAM-issued OIDC/access token KMS trusts (hanzo.id issuer). Required —
      the GitHub Actions OIDC token is only accepted if KMS is configured to
      trust the GitHub issuer; otherwise pass an IAM machine-identity token.
    required: true
  base-url:
    description: KMS host that serves /v1/kms (its own host, not api.<brand>).
    required: false
    default: https://kms.hanzo.ai
  export:
    description: "Where to put secrets: 'env' (job environment) or 'file'."
    required: false
    default: env
  file:
    description: Output dotenv path when export=file.
    required: false
    default: .env

runs:
  using: composite
  steps:
    - name: Load secrets from KMS
      shell: bash
      env:
        KMS_ORG: ${{ inputs.org }}
        KMS_ENV: ${{ inputs.env }}
        KMS_TOKEN: ${{ inputs.token }}
        KMS_BASE: ${{ inputs.base-url }}
        KMS_EXPORT: ${{ inputs.export }}
        KMS_FILE: ${{ inputs.file }}
      run: |
        set -euo pipefail
        secrets_url="${KMS_BASE}/v1/kms/orgs/${KMS_ORG}/secrets"
        auth=(-H "Authorization: Bearer ${KMS_TOKEN}" -H "Accept: application/json")

        # 1. List the env's secret keys (metadata only — no values).
        names=$(curl -sf "${secrets_url}?env=${KMS_ENV}" "${auth[@]}" \
          | jq -r '.secrets[] | [.path, .name] | @tsv')

        [ "${KMS_EXPORT}" = "file" ] && : > "${KMS_FILE}"
        count=0
        # 2. Read each value; export or write it.
        while IFS=$'\t' read -r path name; do
          [ -z "$name" ] && continue
          rest="$name"; [ -n "$path" ] && rest="${path}/${name}"
          val=$(curl -sf "${secrets_url}/${rest}?env=${KMS_ENV}" "${auth[@]}" | jq -r '.secret.value')
          if [ "${KMS_EXPORT}" = "file" ]; then
            echo "${name}=${val}" >> "${KMS_FILE}"
          else
            echo "::add-mask::${val}"
            echo "${name}=${val}" >> "$GITHUB_ENV"
          fi
          count=$((count+1))
        done <<< "$names"
        echo "Loaded ${count} secrets (${KMS_ORG}/${KMS_ENV})"
